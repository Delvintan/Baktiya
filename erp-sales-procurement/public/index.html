<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">🏢</div>
    <h1 class="text-2xl font-black text-white">ERP System</h1>
    <p class="text-slate-400 text-sm mt-1">Sales & Procurement Module</p>
  </div>

  <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-4">
    <div>
      <label class="text-sm font-semibold text-slate-600 block mb-1">Email</label>
      <input id="email" type="email" placeholder="email@perusahaan.com"
        class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <div>
      <label class="text-sm font-semibold text-slate-600 block mb-1">Password</label>
      <input id="password" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()"
        class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <div id="errMsg" class="hidden text-sm text-red-600 bg-red-50 px-4 py-2 rounded-xl"></div>
    <button onclick="doLogin()" id="btnLogin"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition-colors">
      Masuk →
    </button>

    <!-- Demo accounts -->
    <div class="pt-4 border-t border-slate-100">
      <p class="text-xs text-slate-400 text-center font-semibold mb-3">— Akun Demo —</p>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="fill('admin@erp.com')"
          class="py-2 px-3 rounded-xl text-xs font-bold bg-slate-800 text-white hover:bg-slate-700">
          👑 Admin
        </button>
        <button onclick="fill('sales@erp.com')"
          class="py-2 px-3 rounded-xl text-xs font-bold bg-blue-100 text-blue-700 hover:bg-blue-200">
          🛒 Sales
        </button>
        <button onclick="fill('procurement@erp.com')"
          class="py-2 px-3 rounded-xl text-xs font-bold bg-orange-100 text-orange-700 hover:bg-orange-200">
          🏭 Procure
        </button>
      </div>
      <p class="text-xs text-slate-300 text-center mt-2">Password semua: <b class="text-slate-400">password</b></p>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api';

function fill(email) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = 'password';
  document.getElementById('errMsg').classList.add('hidden');
}

async function doLogin() {
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');
  err.classList.add('hidden');
  btn.textContent = 'Memproses...'; btn.disabled = true;

  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.message; err.classList.remove('hidden'); return; }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user',  JSON.stringify(data.user));

    const pages = { sales: 'sales.html', procurement: 'procurement.html', admin: 'sales.html' };
    window.location.href = pages[data.user.role] || 'sales.html';
  } catch(e) {
    err.textContent = 'Tidak bisa terhubung ke server. Pastikan Laravel sudah berjalan.';
    err.classList.remove('hidden');
  } finally {
    btn.textContent = 'Masuk →'; btn.disabled = false;
  }
}
</script>
</body>
</html>
