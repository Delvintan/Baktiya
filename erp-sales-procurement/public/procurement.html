<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procurement — ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🏭</span>
    <div>
      <p class="font-black text-slate-800 text-sm leading-none">Procurement & Purchasing</p>
      <p class="text-xs text-slate-400">ERP System</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="userBadge" class="text-xs font-semibold bg-orange-50 text-orange-700 border border-orange-100 px-3 py-1.5 rounded-full"></div>
    <button onclick="logout()" class="text-xs font-semibold text-slate-500 hover:text-red-500 bg-slate-100 hover:bg-red-50 px-3 py-1.5 rounded-full transition-colors">Logout</button>
  </div>
</nav>

<!-- TABS -->
<div class="max-w-5xl mx-auto px-4 pt-6">
  <div class="flex gap-2 mb-6 flex-wrap">
    <button onclick="showTab('po')"  id="tab_po"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-orange-500 text-white shadow-sm">
      📄 Purchase Orders
    </button>
    <button onclick="showTab('new')" id="tab_new"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-white text-slate-500 border border-slate-200 hover:border-orange-300">
      ➕ Buat PO Baru
    </button>
    <button onclick="showTab('sr')"  id="tab_sr"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-white text-slate-500 border border-slate-200 hover:border-orange-300">
      🛒 Sales Requests
    </button>
  </div>

  <!-- PO LIST -->
  <div id="tab_po_content">
    <div class="flex gap-2 mb-4 flex-wrap">
      <select id="poFilterStatus" onchange="renderPOList()"
        class="border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-400">
        <option value="">Semua Status</option>
        <option value="draft">Draft</option>
        <option value="sent">Sent</option>
        <option value="confirmed">Confirmed</option>
        <option value="received">Received</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input id="poFilterSearch" oninput="renderPOList()" placeholder="Cari supplier / no. PO..."
        class="border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-400 flex-1 min-w-40"/>
    </div>
    <div id="poList" class="space-y-3">
      <div class="text-center py-16 text-slate-400"><div class="text-4xl mb-2">⏳</div><p class="text-sm">Memuat data...</p></div>
    </div>
  </div>

  <!-- NEW PO -->
  <div id="tab_new_content" class="hidden">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
      <div class="bg-gradient-to-r from-orange-500 to-orange-600 px-6 py-4">
        <h2 class="font-black text-white text-lg">Buat Purchase Order</h2>
        <p class="text-orange-200 text-xs mt-0.5">Buka PO untuk membeli item ke supplier</p>
      </div>
      <div class="p-6 space-y-5">
        <div>
          <label class="text-sm font-semibold text-slate-600 block mb-1">Link ke Sales Request (opsional)</label>
          <select id="linkedSR"
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
            <option value="">-- Tidak ada --</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-slate-600 block mb-1">Nama Supplier <span class="text-red-500">*</span></label>
            <input id="supplierName" placeholder="CV Sumber Barang"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"/>
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-600 block mb-1">Estimasi Tiba <span class="text-red-500">*</span></label>
            <input id="expectedDate" type="date"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"/>
          </div>
        </div>

        <!-- Items -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-semibold text-slate-600">Item PO <span class="text-red-500">*</span></label>
            <button onclick="addPOItem()" class="text-xs text-orange-600 hover:text-orange-800 font-semibold bg-orange-50 px-3 py-1 rounded-lg">
              + Tambah Item
            </button>
          </div>
          <div class="grid grid-cols-12 gap-2 px-2 mb-1 text-xs font-bold text-slate-400 uppercase tracking-wide">
            <span class="col-span-4">Nama Item</span>
            <span class="col-span-2 text-center">Qty</span>
            <span class="col-span-2">Unit</span>
            <span class="col-span-3">Harga Satuan</span>
          </div>
          <div id="poItemList" class="space-y-2"></div>
        </div>

        <div id="poTotalBox" class="hidden bg-orange-50 border border-orange-100 rounded-xl p-4 flex justify-between items-center">
          <span class="text-sm font-bold text-orange-700">Total PO</span>
          <span id="poTotalVal" class="text-xl font-black text-orange-800">Rp 0</span>
        </div>

        <div id="poMsg" class="hidden text-sm px-4 py-2.5 rounded-xl"></div>

        <button onclick="submitPO()"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl text-sm transition-colors">
          Buat Purchase Order →
        </button>
      </div>
    </div>
  </div>

  <!-- SR LIST (read only) -->
  <div id="tab_sr_content" class="hidden">
    <div id="srList" class="space-y-3">
      <div class="text-center py-16 text-slate-400"><div class="text-4xl mb-2">⏳</div><p class="text-sm">Memuat data...</p></div>
    </div>
  </div>
</div>

<!-- PO DETAIL MODAL -->
<div id="poModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
    <div class="flex justify-between items-center p-6 border-b border-slate-100">
      <h3 class="font-black text-slate-800">Detail Purchase Order</h3>
      <button onclick="closePOModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
    </div>
    <div id="poModalContent" class="p-6"></div>
  </div>
</div>

<script>
const API   = 'http://localhost:8000/api';
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = 'index.html';

document.getElementById('userBadge').textContent = '👤 ' + user.name + ' · ' + user.role;

function auth() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Accept': 'application/json' };
}
function logout() {
  fetch(`${API}/logout`, { method: 'POST', headers: auth() });
  localStorage.clear();
  window.location.href = 'index.html';
}

const poStatusCfg = {
  draft:      { cls: 'bg-slate-100 text-slate-600 border-slate-200',     label: '📝 Draft' },
  sent:       { cls: 'bg-blue-100 text-blue-700 border-blue-200',        label: '📨 Sent' },
  confirmed:  { cls: 'bg-emerald-100 text-emerald-700 border-emerald-200',label: '✅ Confirmed' },
  partial:    { cls: 'bg-amber-100 text-amber-700 border-amber-200',     label: '⏳ Partial' },
  received:   { cls: 'bg-green-100 text-green-700 border-green-200',     label: '📦 Received' },
  cancelled:  { cls: 'bg-red-100 text-red-600 border-red-200',           label: '❌ Cancelled' },
};

const srStatusCfg = {
  submitted: { cls: 'bg-blue-100 text-blue-700',    label: '⏳ Submitted' },
  approved:  { cls: 'bg-emerald-100 text-emerald-700', label: '✅ Approved' },
  cancelled: { cls: 'bg-red-100 text-red-600',       label: '❌ Cancelled' },
};

function showTab(tab) {
  ['po','new','sr'].forEach(t => {
    document.getElementById('tab_'+t+'_content').classList.toggle('hidden', t !== tab);
    const on = t === tab;
    document.getElementById('tab_'+t).className = `flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${on ? 'bg-orange-500 text-white shadow-sm' : 'bg-white text-slate-500 border border-slate-200 hover:border-orange-300'}`;
  });
  if (tab === 'po')  loadPOList();
  if (tab === 'sr')  loadSRList();
  if (tab === 'new') { loadSROptions(); if (!document.querySelectorAll('#poItemList > div').length) addPOItem(); }
}

let allPO = [];

async function loadPOList() {
  const res = await fetch(`${API}/purchase-orders`, { headers: auth() });
  allPO = await res.json();
  renderPOList();
}

function renderPOList() {
  const status = document.getElementById('poFilterStatus').value;
  const search = document.getElementById('poFilterSearch').value.toLowerCase();
  let data = allPO;
  if (status) data = data.filter(p => p.status === status);
  if (search) data = data.filter(p => p.supplier_name.toLowerCase().includes(search) || p.po_no.toLowerCase().includes(search));

  const list = document.getElementById('poList');
  if (!data.length) {
    list.innerHTML = '<div class="text-center py-16 text-slate-400"><div class="text-4xl mb-2">📭</div><p class="text-sm">Tidak ada data.</p></div>';
    return;
  }

  list.innerHTML = data.map(po => {
    const s = poStatusCfg[po.status] || { cls: 'bg-slate-100 text-slate-500', label: po.status };
    return `
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all p-5">
      <div class="flex justify-between items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <p class="font-bold text-slate-800">${po.po_no}</p>
            <span class="text-xs font-bold px-2.5 py-0.5 rounded-full border ${s.cls}">${s.label}</span>
          </div>
          <p class="text-slate-600 text-sm mt-1 font-medium">🏪 ${po.supplier_name}</p>
          ${po.sales_request ? `<p class="text-xs text-blue-500 mt-0.5">Linked SR: ${po.sales_request.request_no} — ${po.sales_request.customer_name}</p>` : ''}
          <p class="text-xs text-slate-400 mt-0.5">📅 Estimasi tiba: ${po.expected_date}</p>
        </div>
        <p class="text-base font-black text-slate-800 shrink-0">Rp ${Number(po.total).toLocaleString('id-ID')}</p>
      </div>

      <div class="mt-3 flex flex-wrap gap-1.5">
        ${po.items.map(i => `<span class="text-xs bg-orange-50 border border-orange-100 text-orange-700 px-2.5 py-1 rounded-lg font-medium">${i.item_name} × ${i.qty} ${i.unit}</span>`).join('')}
      </div>

      <div class="mt-4 flex items-center justify-between flex-wrap gap-2">
        <div class="flex gap-1.5 flex-wrap">
          ${Object.entries(poStatusCfg).filter(([k]) => k !== po.status && k !== 'partial').map(([k,v]) =>
            `<button onclick="updateStatus(${po.id},'${k}')"
              class="text-xs px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-500 font-medium transition-colors">
              ${v.label}
            </button>`).join('')}
        </div>
        <button onclick="showPODetail(${po.id})"
          class="text-xs px-3 py-1.5 bg-orange-50 hover:bg-orange-100 text-orange-600 rounded-lg font-semibold transition-colors">
          👁 Detail
        </button>
      </div>
    </div>`;
  }).join('');
}

async function loadSRList() {
  const res  = await fetch(`${API}/procurement/sales-requests`, { headers: auth() });
  const data = await res.json();
  const list = document.getElementById('srList');
  if (!data.length) { list.innerHTML = '<div class="text-center py-16 text-slate-400"><div class="text-4xl mb-2">📭</div><p class="text-sm">Tidak ada Sales Request.</p></div>'; return; }

  list.innerHTML = data.map(sr => {
    const s = srStatusCfg[sr.status] || { cls: 'bg-slate-100 text-slate-500', label: sr.status };
    const total = sr.items.reduce((a,i) => a + i.qty * i.est_price, 0);
    return `
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex justify-between items-start">
        <div>
          <p class="font-bold text-slate-800">${sr.request_no}</p>
          <p class="text-slate-600 text-sm">👤 ${sr.customer_name}</p>
        </div>
        <div class="text-right">
          <span class="text-xs font-bold px-2.5 py-0.5 rounded-full ${s.cls}">${s.label}</span>
          ${total > 0 ? `<p class="text-sm font-bold text-slate-700 mt-1">Rp ${total.toLocaleString('id-ID')}</p>` : ''}
        </div>
      </div>
      <div class="mt-2 flex flex-wrap gap-1.5">
        ${sr.items.map(i => `<span class="text-xs bg-slate-50 border border-slate-200 px-2.5 py-1 rounded-lg text-slate-600">${i.item_name} × ${i.qty} ${i.unit}</span>`).join('')}
      </div>
      ${sr.status === 'submitted' ? `
      <button onclick="quickCreatePO(${sr.id}, '${sr.customer_name}')"
        class="mt-3 text-xs px-3 py-1.5 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-semibold transition-colors">
        🏭 Buat PO dari SR ini
      </button>` : ''}
    </div>`;
  }).join('');
}

async function loadSROptions() {
  const res  = await fetch(`${API}/procurement/sales-requests`, { headers: auth() });
  const data = await res.json();
  document.getElementById('linkedSR').innerHTML =
    '<option value="">-- Tidak ada --</option>' +
    data.filter(s => s.status === 'submitted').map(s =>
      `<option value="${s.id}">${s.request_no} — ${s.customer_name}</option>`).join('');
}

function addPOItem() {
  const div = document.createElement('div');
  div.className = 'grid grid-cols-12 gap-2 items-center';
  div.innerHTML = `
    <input placeholder="Nama item" data-f="item_name"
      class="col-span-4 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"/>
    <input type="number" min="1" value="1" data-f="qty" oninput="calcTotal()"
      class="col-span-2 border border-slate-200 rounded-xl px-2 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-orange-400"/>
    <input placeholder="pcs" data-f="unit"
      class="col-span-2 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"/>
    <input type="number" placeholder="0" data-f="price" oninput="calcTotal()"
      class="col-span-3 border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"/>
    <button onclick="this.parentElement.remove();calcTotal()"
      class="col-span-1 w-7 h-7 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors text-lg font-bold">×</button>`;
  document.getElementById('poItemList').appendChild(div);
}

function calcTotal() {
  const rows = document.querySelectorAll('#poItemList > div');
  let t = 0;
  rows.forEach(r => { t += (parseFloat(r.querySelector('[data-f=qty]').value)||0) * (parseFloat(r.querySelector('[data-f=price]').value)||0); });
  document.getElementById('poTotalBox').classList.remove('hidden');
  document.getElementById('poTotalVal').textContent = 'Rp ' + t.toLocaleString('id-ID');
}

function showMsg(elId, text, type) {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className = `text-sm px-4 py-2.5 rounded-xl ${type === 'ok' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 4000);
}

async function submitPO() {
  const items = Array.from(document.querySelectorAll('#poItemList > div')).map(r => ({
    item_name: r.querySelector('[data-f=item_name]').value.trim(),
    qty:       parseInt(r.querySelector('[data-f=qty]').value) || 1,
    unit:      r.querySelector('[data-f=unit]').value || 'pcs',
    price:     parseFloat(r.querySelector('[data-f=price]').value) || 0,
  }));
  const body = {
    supplier_name:    document.getElementById('supplierName').value.trim(),
    expected_date:    document.getElementById('expectedDate').value,
    sales_request_id: document.getElementById('linkedSR').value || null,
    items,
  };
  if (!body.supplier_name) return showMsg('poMsg', '⚠️ Nama supplier wajib diisi!', 'err');
  if (!body.expected_date) return showMsg('poMsg', '⚠️ Estimasi tiba wajib diisi!', 'err');
  if (!items.length || items.some(i => !i.item_name)) return showMsg('poMsg', '⚠️ Tambah minimal 1 item!', 'err');

  const res  = await fetch(`${API}/purchase-orders`, { method: 'POST', headers: auth(), body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) return showMsg('poMsg', '❌ ' + (data.message || JSON.stringify(data.errors)), 'err');

  showMsg('poMsg', '✅ Purchase Order ' + data.po_no + ' berhasil dibuat!', 'ok');
  setTimeout(() => showTab('po'), 1500);
}

async function updateStatus(id, status) {
  await fetch(`${API}/purchase-orders/${id}/status`, { method: 'PATCH', headers: auth(), body: JSON.stringify({ status }) });
  loadPOList();
}

async function showPODetail(id) {
  const res = await fetch(`${API}/purchase-orders/${id}`, { headers: auth() });
  const po  = await res.json();
  const s   = poStatusCfg[po.status] || { cls: 'bg-slate-100 text-slate-500', label: po.status };

  document.getElementById('poModalContent').innerHTML = `
    <div class="space-y-4">
      <div class="flex justify-between items-center">
        <p class="font-bold text-slate-800 text-lg">${po.po_no}</p>
        <span class="text-xs font-bold px-3 py-1 rounded-full border ${s.cls}">${s.label}</span>
      </div>
      <div class="bg-slate-50 rounded-xl p-4 space-y-1 text-sm">
        <p><span class="text-slate-400">Supplier:</span> <span class="font-semibold">${po.supplier_name}</span></p>
        <p><span class="text-slate-400">Estimasi Tiba:</span> <span class="font-semibold">${po.expected_date}</span></p>
        <p><span class="text-slate-400">Dibuat oleh:</span> <span class="font-semibold">${po.creator?.name || '-'}</span></p>
        ${po.sales_request ? `<p><span class="text-slate-400">Linked SR:</span> <span class="font-semibold text-blue-600">${po.sales_request.request_no}</span></p>` : ''}
      </div>
      <div>
        <p class="text-sm font-bold text-slate-600 mb-2">Item PO:</p>
        <table class="w-full text-sm border border-slate-100 rounded-xl overflow-hidden">
          <thead class="bg-slate-50">
            <tr class="text-xs text-slate-400 font-bold">
              <th class="text-left px-4 py-2">Item</th>
              <th class="text-center px-2 py-2">Qty</th>
              <th class="text-right px-4 py-2">Harga</th>
              <th class="text-right px-4 py-2">Subtotal</th>
            </tr>
          </thead>
          <tbody>
            ${po.items.map(i => `
              <tr class="border-t border-slate-50">
                <td class="px-4 py-2.5 font-medium">${i.item_name}</td>
                <td class="text-center px-2 py-2.5 text-slate-600">${i.qty} ${i.unit}</td>
                <td class="text-right px-4 py-2.5 text-slate-600">Rp ${Number(i.price).toLocaleString('id-ID')}</td>
                <td class="text-right px-4 py-2.5 font-semibold">Rp ${Number(i.subtotal).toLocaleString('id-ID')}</td>
              </tr>`).join('')}
          </tbody>
          <tfoot>
            <tr class="border-t-2 border-slate-200 bg-slate-50">
              <td colspan="3" class="px-4 py-3 font-bold text-slate-700">Total</td>
              <td class="text-right px-4 py-3 font-black text-slate-800">Rp ${Number(po.total).toLocaleString('id-ID')}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;
  document.getElementById('poModal').classList.remove('hidden');
}

function closePOModal() { document.getElementById('poModal').classList.add('hidden'); }

function quickCreatePO(srId, customer) {
  showTab('new');
  setTimeout(() => {
    const sel = document.getElementById('linkedSR');
    sel.value = srId;
  }, 300);
}

// Init
loadPOList();
</script>
</body>
</html>
