<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales — ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🛒</span>
    <div>
      <p class="font-black text-slate-800 text-sm leading-none">Sales Module</p>
      <p class="text-xs text-slate-400">ERP System</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="userBadge" class="text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-100 px-3 py-1.5 rounded-full"></div>
    <button onclick="logout()" class="text-xs font-semibold text-slate-500 hover:text-red-500 bg-slate-100 hover:bg-red-50 px-3 py-1.5 rounded-full transition-colors">
      Logout
    </button>
  </div>
</nav>

<!-- TABS -->
<div class="max-w-5xl mx-auto px-4 pt-6">
  <div class="flex gap-2 mb-6">
    <button onclick="showTab('list')" id="tab_list"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 text-white shadow-sm">
      📋 Daftar SR
    </button>
    <button onclick="showTab('new')" id="tab_new"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-white text-slate-500 border border-slate-200 hover:border-blue-300">
      ➕ Buat SR Baru
    </button>
  </div>

  <!-- LIST TAB -->
  <div id="tab_list_content">
    <!-- Filter bar -->
    <div class="flex gap-2 mb-4 flex-wrap">
      <select id="filterStatus" onchange="loadList()"
        class="border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="">Semua Status</option>
        <option value="submitted">Submitted</option>
        <option value="approved">Approved</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input id="filterSearch" oninput="loadList()" placeholder="Cari customer / no. SR..."
        class="border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1 min-w-40"/>
      <button onclick="loadList()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-blue-700">
        🔍 Cari
      </button>
    </div>
    <div id="srList" class="space-y-3">
      <div class="text-center py-16 text-slate-400">
        <div class="text-4xl mb-2">⏳</div>
        <p class="text-sm">Memuat data...</p>
      </div>
    </div>
  </div>

  <!-- NEW TAB -->
  <div id="tab_new_content" class="hidden">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
      <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4">
        <h2 class="font-black text-white text-lg">Buat Sales Request Baru</h2>
        <p class="text-blue-200 text-xs mt-0.5">Request item dari customer ke procurement</p>
      </div>
      <div class="p-6 space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="text-sm font-semibold text-slate-600 block mb-1">Nama Customer <span class="text-red-500">*</span></label>
            <input id="custName" placeholder="PT Maju Jaya"
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div class="col-span-2">
            <label class="text-sm font-semibold text-slate-600 block mb-1">Catatan</label>
            <textarea id="notes" rows="2" placeholder="Catatan tambahan dari customer..."
              class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
          </div>
        </div>

        <!-- Items -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-semibold text-slate-600">Item yang Diminta <span class="text-red-500">*</span></label>
            <button onclick="addItem()" class="text-xs text-blue-600 hover:text-blue-800 font-semibold bg-blue-50 px-3 py-1 rounded-lg">
              + Tambah Item
            </button>
          </div>
          <!-- Header -->
          <div class="grid grid-cols-12 gap-2 px-2 mb-1 text-xs font-bold text-slate-400 uppercase tracking-wide">
            <span class="col-span-4">Nama Item</span>
            <span class="col-span-3">Deskripsi</span>
            <span class="col-span-1 text-center">Qty</span>
            <span class="col-span-2">Unit</span>
            <span class="col-span-2 text-right">Est. Harga</span>
          </div>
          <div id="itemList" class="space-y-2"></div>
        </div>

        <div id="srMsg" class="hidden text-sm px-4 py-2.5 rounded-xl"></div>

        <button onclick="submitSR()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition-colors">
          Submit Sales Request →
        </button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
    <div class="flex justify-between items-center p-6 border-b border-slate-100">
      <h3 class="font-black text-slate-800">Detail Sales Request</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
    </div>
    <div id="modalContent" class="p-6"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api';
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = 'index.html';

document.getElementById('userBadge').textContent = '👤 ' + user.name + ' · ' + user.role;

function auth() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Accept': 'application/json' };
}

function logout() {
  fetch(`${API}/logout`, { method: 'POST', headers: auth() });
  localStorage.clear();
  window.location.href = 'index.html';
}

const statusCfg = {
  submitted:  { cls: 'bg-blue-100 text-blue-700 border-blue-200',     label: '⏳ Submitted' },
  approved:   { cls: 'bg-emerald-100 text-emerald-700 border-emerald-200', label: '✅ Approved' },
  cancelled:  { cls: 'bg-red-100 text-red-600 border-red-200',         label: '❌ Cancelled' },
};

function showTab(tab) {
  ['list','new'].forEach(t => {
    document.getElementById('tab_'+t+'_content').classList.toggle('hidden', t !== tab);
    const on = t === tab;
    document.getElementById('tab_'+t).className = `flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${on ? 'bg-blue-600 text-white shadow-sm' : 'bg-white text-slate-500 border border-slate-200 hover:border-blue-300'}`;
  });
  if (tab === 'list') loadList();
  if (tab === 'new' && document.querySelectorAll('#itemList > div').length === 0) addItem();
}

let allSR = [];

async function loadList() {
  const res  = await fetch(`${API}/sales-requests`, { headers: auth() });
  allSR = await res.json();
  renderList();
}

function renderList() {
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  let data = allSR;
  if (status) data = data.filter(s => s.status === status);
  if (search) data = data.filter(s => s.customer_name.toLowerCase().includes(search) || s.request_no.toLowerCase().includes(search));

  const list = document.getElementById('srList');
  if (!data.length) {
    list.innerHTML = '<div class="text-center py-16 text-slate-400"><div class="text-4xl mb-2">📭</div><p class="text-sm">Tidak ada data ditemukan.</p></div>';
    return;
  }

  list.innerHTML = data.map(sr => {
    const s = statusCfg[sr.status] || { cls: 'bg-slate-100 text-slate-500', label: sr.status };
    const total = sr.items.reduce((acc,i) => acc + i.qty * i.est_price, 0);
    return `
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all p-5">
      <div class="flex justify-between items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <p class="font-bold text-slate-800">${sr.request_no}</p>
            <span class="text-xs font-bold px-2.5 py-0.5 rounded-full border ${s.cls}">${s.label}</span>
          </div>
          <p class="text-slate-600 text-sm mt-1 font-medium">👤 ${sr.customer_name}</p>
          ${sr.notes ? `<p class="text-slate-400 text-xs mt-0.5 truncate">${sr.notes}</p>` : ''}
        </div>
        ${total > 0 ? `<p class="text-base font-black text-slate-700 shrink-0">Rp ${total.toLocaleString('id-ID')}</p>` : ''}
      </div>

      <div class="mt-3 flex flex-wrap gap-1.5">
        ${sr.items.map(i => `
          <span class="text-xs bg-blue-50 border border-blue-100 text-blue-700 px-2.5 py-1 rounded-lg font-medium">
            ${i.item_name} <span class="text-blue-400">× ${i.qty} ${i.unit}</span>
          </span>`).join('')}
      </div>

      <div class="mt-4 flex items-center justify-between">
        <p class="text-xs text-slate-400">📅 ${new Date(sr.created_at).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'})}</p>
        <div class="flex gap-2">
          <button onclick="showDetail(${sr.id})"
            class="text-xs px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-semibold transition-colors">
            👁 Detail
          </button>
          ${sr.status === 'submitted' ? `
          <button onclick="cancelSR(${sr.id})"
            class="text-xs px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg font-semibold transition-colors">
            ❌ Cancel
          </button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function addItem() {
  const div = document.createElement('div');
  div.className = 'grid grid-cols-12 gap-2 items-center group';
  div.innerHTML = `
    <input placeholder="Nama item" data-f="item_name"
      class="col-span-4 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    <input placeholder="Deskripsi" data-f="description"
      class="col-span-3 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    <input type="number" min="1" value="1" data-f="qty"
      class="col-span-1 border border-slate-200 rounded-xl px-2 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    <input placeholder="pcs" data-f="unit"
      class="col-span-2 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    <input type="number" placeholder="0" data-f="est_price"
      class="col-span-1 border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    <button onclick="this.parentElement.remove()"
      class="col-span-1 w-7 h-7 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors text-lg font-bold">×</button>`;
  document.getElementById('itemList').appendChild(div);
}

function showMsg(elId, text, type) {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className = `text-sm px-4 py-2.5 rounded-xl ${type === 'ok' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 4000);
}

async function submitSR() {
  const customer = document.getElementById('custName').value.trim();
  const notes    = document.getElementById('notes').value;
  const rows     = document.querySelectorAll('#itemList > div');
  const items    = Array.from(rows).map(r => ({
    item_name:   r.querySelector('[data-f=item_name]').value.trim(),
    description: r.querySelector('[data-f=description]').value,
    qty:         parseInt(r.querySelector('[data-f=qty]').value) || 1,
    unit:        r.querySelector('[data-f=unit]').value || 'pcs',
    est_price:   parseFloat(r.querySelector('[data-f=est_price]').value) || 0,
  }));

  if (!customer) return showMsg('srMsg', '⚠️ Nama customer wajib diisi!', 'err');
  if (!items.length || items.some(i => !i.item_name)) return showMsg('srMsg', '⚠️ Tambah minimal 1 item dan isi nama item!', 'err');

  const res  = await fetch(`${API}/sales-requests`, { method: 'POST', headers: auth(), body: JSON.stringify({ customer_name: customer, notes, items }) });
  const data = await res.json();
  if (!res.ok) return showMsg('srMsg', '❌ ' + (data.message || JSON.stringify(data.errors)), 'err');

  showMsg('srMsg', '✅ Sales Request ' + data.request_no + ' berhasil dibuat!', 'ok');
  document.getElementById('custName').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('itemList').innerHTML = '';
  addItem();
  setTimeout(() => showTab('list'), 1500);
}

async function cancelSR(id) {
  if (!confirm('Yakin ingin cancel Sales Request ini?')) return;
  await fetch(`${API}/sales-requests/${id}/status`, { method: 'PATCH', headers: auth(), body: JSON.stringify({ status: 'cancelled' }) });
  loadList();
}

async function showDetail(id) {
  const res  = await fetch(`${API}/sales-requests/${id}`, { headers: auth() });
  const sr   = await res.json();
  const s    = statusCfg[sr.status] || { cls: 'bg-slate-100 text-slate-500', label: sr.status };
  const total = sr.items.reduce((acc,i) => acc + i.qty * i.est_price, 0);

  document.getElementById('modalContent').innerHTML = `
    <div class="space-y-4">
      <div class="flex justify-between items-center">
        <p class="font-bold text-slate-800 text-lg">${sr.request_no}</p>
        <span class="text-xs font-bold px-3 py-1 rounded-full border ${s.cls}">${s.label}</span>
      </div>
      <div class="bg-slate-50 rounded-xl p-4 space-y-1 text-sm">
        <p><span class="text-slate-400">Customer:</span> <span class="font-semibold">${sr.customer_name}</span></p>
        <p><span class="text-slate-400">Dibuat oleh:</span> <span class="font-semibold">${sr.creator?.name || '-'}</span></p>
        <p><span class="text-slate-400">Tanggal:</span> <span class="font-semibold">${new Date(sr.created_at).toLocaleDateString('id-ID', {weekday:'long', day:'2-digit', month:'long', year:'numeric'})}</span></p>
        ${sr.notes ? `<p><span class="text-slate-400">Catatan:</span> ${sr.notes}</p>` : ''}
      </div>
      <div>
        <p class="text-sm font-bold text-slate-600 mb-2">Item yang Diminta:</p>
        <table class="w-full text-sm border border-slate-100 rounded-xl overflow-hidden">
          <thead class="bg-slate-50">
            <tr class="text-xs text-slate-400 font-bold">
              <th class="text-left px-4 py-2">Item</th>
              <th class="text-center px-2 py-2">Qty</th>
              <th class="text-right px-4 py-2">Est. Harga</th>
              <th class="text-right px-4 py-2">Subtotal</th>
            </tr>
          </thead>
          <tbody>
            ${sr.items.map(i => `
              <tr class="border-t border-slate-50">
                <td class="px-4 py-2.5">
                  <p class="font-medium">${i.item_name}</p>
                  ${i.description ? `<p class="text-xs text-slate-400">${i.description}</p>` : ''}
                </td>
                <td class="text-center px-2 py-2.5 text-slate-600">${i.qty} ${i.unit}</td>
                <td class="text-right px-4 py-2.5 text-slate-600">Rp ${Number(i.est_price).toLocaleString('id-ID')}</td>
                <td class="text-right px-4 py-2.5 font-semibold">Rp ${(i.qty * i.est_price).toLocaleString('id-ID')}</td>
              </tr>`).join('')}
          </tbody>
          <tfoot>
            <tr class="border-t-2 border-slate-200 bg-slate-50">
              <td colspan="3" class="px-4 py-3 font-bold text-slate-700">Total Estimasi</td>
              <td class="text-right px-4 py-3 font-black text-slate-800">Rp ${total.toLocaleString('id-ID')}</td>
            </tr>
          </tfoot>
        </table>
      </div>
      ${sr.purchase_orders?.length ? `
        <div>
          <p class="text-sm font-bold text-slate-600 mb-2">Purchase Orders:</p>
          ${sr.purchase_orders.map(po => `
            <div class="bg-orange-50 border border-orange-100 rounded-xl p-3 text-sm">
              <p class="font-bold text-orange-700">${po.po_no}</p>
              <p class="text-orange-600 text-xs">${po.supplier_name} · Rp ${Number(po.total).toLocaleString('id-ID')} · ${po.status}</p>
            </div>`).join('')}
        </div>` : ''}
    </div>`;
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

// Init
loadList();
</script>
</body>
</html>
